kind = "web"
previewPath = "/"
title = "AI Timestamp"
version = "1.0.0"
id = "artifacts/ai-timestamp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25969
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-timestamp run dev"

[services.env]
PORT = "25969"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ai-timestamp", "run", "build"]
publicDir = "artifacts/ai-timestamp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
